<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>熊二</title>

    <link rel="icon" type="image/png" href="https://www.image2url.com/r2/default/images/1776426792354-ff60a9ec-02fb-4fa1-86f4-c8787cc8d21f.png">
    <link rel="apple-touch-icon" href="https://www.image2url.com/r2/default/images/1776426792354-ff60a9ec-02fb-4fa1-86f4-c8787cc8d21f.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: rgba(15, 20, 30, 0.85);
            --bg-card: rgba(255, 255, 255, 0.03);
            --text-primary: #ffffff;
            --text-secondary: #8b9bb5;
            --accent: #f59e0b;
            --accent-dark: #ea580c;
            --success: #4ade80;
            --danger: #ef4444;
            --warning: #fbbf24;
            --border-color: rgba(255, 255, 255, 0.06);
            --glow: 0 0 40px rgba(245, 158, 11, 0.15);
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* 动态背景 */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, #1a2744 0%, #0a0a0f 50%, #000000 100%);
            z-index: -2;
        }
        
        .bg-glow {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(245, 158, 11, 0.08) 0%, transparent 50%);
            animation: slowRotate 30s linear infinite;
            z-index: -1;
        }
        
        @keyframes slowRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 登录页面 */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            background: var(--bg-secondary);
            backdrop-filter: blur(40px);
            border-radius: 48px;
            padding: 48px 40px;
            box-shadow: var(--glow), 0 20px 60px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 440px;
            border: 1px solid rgba(245, 158, 11, 0.15);
            animation: floatIn 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        @keyframes floatIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .login-logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 28px;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(245, 158, 11, 0.3), 0 0 0 3px rgba(245, 158, 11, 0.2);
            animation: logoPulse 3s ease-in-out infinite;
        }
        
        .login-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 20px 40px rgba(245, 158, 11, 0.3), 0 0 0 3px rgba(245, 158, 11, 0.2); }
            50% { box-shadow: 0 25px 50px rgba(245, 158, 11, 0.5), 0 0 0 5px rgba(245, 158, 11, 0.3); }
        }
        
        .login-card h2 {
            color: var(--text-primary);
            font-weight: 800;
            font-size: 32px;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .login-subtitle {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 36px;
            font-size: 15px;
        }
        
        .input-wrapper {
            position: relative;
            margin-bottom: 28px;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 22px;
            z-index: 1;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 18px 20px 18px 58px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--border-color);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .input-wrapper input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            border: none;
            border-radius: 24px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .btn-login::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn-login:hover::before {
            width: 400px;
            height: 400px;
        }
        
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(245, 158, 11, 0.4);
        }

        /* 主面板 */
        .dashboard { 
            display: none; 
            min-height: 100vh;
        }
        
        /* 侧边栏 - 桌面版 */
        .sidebar {
            position: fixed;
            left: 20px;
            top: 20px;
            bottom: 20px;
            width: 300px;
            background: var(--bg-secondary);
            backdrop-filter: blur(40px);
            border-radius: 40px;
            border: 1px solid var(--border-color);
            padding: 28px 18px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--glow);
            z-index: 100;
        }
        
        .logo {
            display: flex;
            align-items: center;
            padding: 8px 16px 24px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
        }
        
        .logo-icon {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            overflow: hidden;
            margin-right: 16px;
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.2);
        }
        
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .logo-text h4 {
            color: var(--text-primary);
            font-weight: 800;
            margin: 0;
            font-size: 20px;
            letter-spacing: -0.3px;
        }
        
        .logo-text span {
            color: var(--accent);
            font-size: 13px;
            font-weight: 600;
        }
        
        .nav-menu {
            flex: 1;
            list-style: none;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 16px 18px;
            margin-bottom: 6px;
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 15px;
            position: relative;
        }
        
        .nav-item i {
            font-size: 24px;
            margin-right: 16px;
            width: 32px;
            transition: transform 0.3s;
        }
        
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }
        
        .nav-item:hover i {
            transform: translateX(4px);
        }
        
        .nav-item.active {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(234, 88, 12, 0.1));
            color: var(--accent);
        }
        
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, var(--accent), var(--accent-dark));
            border-radius: 0 4px 4px 0;
        }
        
        .nav-item.logout {
            margin-top: auto;
            color: var(--danger);
        }

        /* 移动端底部导航 */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            backdrop-filter: blur(40px);
            border-top: 1px solid var(--border-color);
            padding: 12px 20px;
            z-index: 100;
        }
        
        .mobile-nav-items {
            display: flex;
            justify-content: space-around;
        }
        
        .mobile-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            padding: 8px 16px;
            border-radius: 40px;
        }
        
        .mobile-nav-item i {
            font-size: 24px;
            margin-bottom: 4px;
        }
        
        .mobile-nav-item span {
            font-size: 11px;
            font-weight: 600;
        }
        
        .mobile-nav-item.active {
            color: var(--accent);
            background: rgba(245, 158, 11, 0.1);
        }

        /* 主内容区 */
        .main-content {
            margin-left: 340px;
            margin-right: 20px;
            padding: 20px 0 100px;
            transition: margin 0.3s;
        }
        
        /* 顶部栏 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 28px;
            margin-bottom: 24px;
            background: var(--bg-secondary);
            backdrop-filter: blur(40px);
            border-radius: 30px;
            border: 1px solid var(--border-color);
        }
        
        .page-title {
            color: var(--text-primary);
            font-size: 28px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
        }
        
        .top-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .refresh-btn {
            width: 48px;
            height: 48px;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 18px;
            color: var(--accent);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: rgba(245, 158, 11, 0.2);
            transform: rotate(180deg);
        }
        
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.1);
            padding: 10px 18px;
            border-radius: 40px;
            color: var(--success);
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        
        .status-badge .dot {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }

        /* 页面 */
        .page {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        
        .page.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 18px;
            margin-bottom: 28px;
        }
        
        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 24px 20px;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }
        
        .stat-card:hover::before {
            transform: translateX(100%);
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(245, 158, 11, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 18px;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 内容卡片 */
        .content-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 28px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .card-header h5 {
            color: var(--text-primary);
            font-weight: 700;
            font-size: 18px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .card-header i {
            color: var(--accent);
            font-size: 26px;
        }

        /* 快捷操作 */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }
        
        .action-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 20px 12px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-align: center;
        }
        
        .action-btn i {
            font-size: 32px;
            color: var(--accent);
        }
        
        .action-btn span {
            font-size: 13px;
            font-weight: 600;
        }
        
        .action-btn:hover {
            background: rgba(245, 158, 11, 0.1);
            border-color: var(--accent);
            transform: translateY(-3px);
        }

        /* 富豪榜 */
        .rich-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        
        .rich-item:last-child {
            border-bottom: none;
        }
        
        .rich-item:hover {
            background: rgba(255, 255, 255, 0.02);
            padding-left: 8px;
            padding-right: 8px;
            border-radius: 16px;
        }
        
        .rich-rank {
            width: 40px;
            font-size: 20px;
            font-weight: 800;
        }
        
        .rank-1 { color: #ffd700; }
        .rank-2 { color: #c0c0c0; }
        .rank-3 { color: #cd7f32; }
        
        .rich-info {
            flex: 1;
        }
        
        .rich-id {
            color: var(--text-primary);
            font-family: 'SF Mono', monospace;
            font-size: 14px;
            font-weight: 600;
        }
        
        .rich-coins {
            font-weight: 700;
            color: var(--accent);
            background: rgba(245, 158, 11, 0.12);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        /* 表格 */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
        }
        
        .data-table {
            width: 100%;
            color: var(--text-primary);
            border-collapse: collapse;
        }
        
        .data-table th {
            padding: 18px 20px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
            white-space: nowrap;
        }
        
        .data-table td {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }
        
        .data-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        
        .badge-coin {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
        }
        
        .badge-status {
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 12px;
        }
        
        .status-running {
            background: rgba(34, 197, 94, 0.12);
            color: var(--success);
        }
        
        .status-paused {
            background: rgba(245, 158, 11, 0.12);
            color: var(--accent);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }
        
        .btn-icon:hover {
            background: rgba(245, 158, 11, 0.1);
            border-color: var(--accent);
        }
        
        .btn-icon.danger:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--danger);
            color: var(--danger);
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal {
            background: var(--bg-secondary);
            border-radius: 36px;
            padding: 32px;
            max-width: 480px;
            width: 100%;
            border: 1px solid var(--border-color);
            box-shadow: var(--glow);
        }
        
        .modal h3 {
            color: var(--text-primary);
            margin-bottom: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .modal input,
        .modal textarea,
        .modal select {
            width: 100%;
            padding: 16px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            color: var(--text-primary);
            margin-bottom: 16px;
            font-size: 15px;
        }
        
        .modal input:focus,
        .modal textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        
        .btn {
            padding: 14px 28px;
            border-radius: 18px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
        }
        
        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        /* 通知 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            left: 20px;
            max-width: 400px;
            margin-left: auto;
            background: var(--bg-secondary);
            backdrop-filter: blur(40px);
            border-radius: 20px;
            padding: 18px 24px;
            border: 1px solid var(--border-color);
            z-index: 9999;
            animation: slideIn 0.3s ease;
            box-shadow: var(--glow);
        }
        
        .notification.success {
            border-left: 4px solid var(--success);
        }
        
        .notification.error {
            border-left: 4px solid var(--danger);
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 响应式 */
        @media (max-width: 1400px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .quick-actions { grid-template-columns: repeat(3, 1fr); }
        }
        
        @media (max-width: 1024px) {
            .sidebar { display: none; }
            .mobile-nav { display: block; }
            .main-content { 
                margin-left: 20px; 
                margin-right: 20px;
                padding-bottom: 100px;
            }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 640px) {
            .login-card { padding: 36px 24px; }
            .login-logo { width: 80px; height: 80px; }
            .stats-grid { grid-template-columns: 1fr; }
            .quick-actions { grid-template-columns: repeat(2, 1fr); }
            .top-bar { flex-direction: column; gap: 16px; align-items: flex-start; }
            .page-title { font-size: 24px; }
            .stat-value { font-size: 32px; }
            .content-card { padding: 20px; }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(245, 158, 11, 0.3);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(245, 158, 11, 0.5);
        }

        /* 加载动画 */
        .spin {
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-glow"></div>

    <!-- 登录页面 -->
    <div class="login-page" id="loginPage">
        <div class="login-card">
            <div class="login-logo">
                <img src="https://www.image2url.com/r2/default/images/1776426792354-ff60a9ec-02fb-4fa1-86f4-c8787cc8d21f.png" alt="熊二">
            </div>
            <h2>熊二</h2>
            <p class="login-subtitle">后台</p>
            <div class="input-wrapper">
                <i class="bi bi-shield-lock"></i>
                <input type="password" id="passwordInput" placeholder="输入密码兄弟" autocomplete="off">
            </div>
            <button class="btn-login" onclick="login()">登 录</button>
            <div id="loginError" style="color: #ef4444; text-align: center; margin-top: 16px;"></div>
        </div>
    </div>

    <!-- 主面板 -->
    <div class="dashboard" id="dashboard">
        <!-- 桌面侧边栏 -->
        <div class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <img src="https://www.image2url.com/r2/default/images/1776426792354-ff60a9ec-02fb-4fa1-86f4-c8787cc8d21f.png" alt="熊二">
                </div>
                <div class="logo-text">
                    <h4>熊二</h4>
                    <span>智能群管</span>
                </div>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active" data-page="overview" onclick="switchPage('overview')">
                    <i class="bi bi-speedometer2"></i> 控制面板
                </li>
                <li class="nav-item" data-page="users" onclick="switchPage('users')">
                    <i class="bi bi-people"></i> 用户管理
                </li>
                <li class="nav-item" data-page="tasks" onclick="switchPage('tasks')">
                    <i class="bi bi-clock-history"></i> 定时任务
                </li>
                <li class="nav-item logout" onclick="logout()">
                    <i class="bi bi-box-arrow-right"></i> 退出登录
                </li>
            </ul>
        </div>

        <!-- 移动端底部导航 -->
        <div class="mobile-nav">
            <div class="mobile-nav-items">
                <div class="mobile-nav-item active" data-page="overview" onclick="switchPage('overview')">
                    <i class="bi bi-speedometer2"></i>
                    <span>控制</span>
                </div>
                <div class="mobile-nav-item" data-page="users" onclick="switchPage('users')">
                    <i class="bi bi-people"></i>
                    <span>用户</span>
                </div>
                <div class="mobile-nav-item" data-page="tasks" onclick="switchPage('tasks')">
                    <i class="bi bi-clock-history"></i>
                    <span>任务</span>
                </div>
                <div class="mobile-nav-item" onclick="logout()">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>退出</span>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <h2 class="page-title" id="pageTitle">🎮 控制面板</h2>
                <div class="top-right">
                    <button class="refresh-btn" onclick="refreshData()">
                        <i class="bi bi-arrow-repeat" id="refreshIcon"></i>
                    </button>
                    <div class="status-badge">
                        <span class="dot"></span>
                        <span>在线</span>
                    </div>
                </div>
            </div>

            <!-- 控制面板页面 -->
            <div class="page active" id="page-overview">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(99, 102, 241, 0.15); color: #818cf8;">
                            <i class="bi bi-people"></i>
                        </div>
                        <div class="stat-value" id="totalUsers">0</div>
                        <div class="stat-label">总用户</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(245, 158, 11, 0.15); color: #fbbf24;">
                            <i class="bi bi-coin"></i>
                        </div>
                        <div class="stat-value" id="totalCoins">0</div>
                        <div class="stat-label">总XD币</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(34, 197, 94, 0.15); color: #4ade80;">
                            <i class="bi bi-chat-dots"></i>
                        </div>
                        <div class="stat-value" id="totalMessages">0</div>
                        <div class="stat-label">总发言</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(236, 72, 153, 0.15); color: #f472b6;">
                            <i class="bi bi-person-plus"></i>
                        </div>
                        <div class="stat-value" id="todayNew">0</div>
                        <div class="stat-label">今日新增</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(14, 165, 233, 0.15); color: #38bdf8;">
                            <i class="bi bi-clock"></i>
                        </div>
                        <div class="stat-value" id="activeTasks">0</div>
                        <div class="stat-label">活跃任务</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(168, 85, 247, 0.15); color: #c084fc;">
                            <i class="bi bi-trophy"></i>
                        </div>
                        <div class="stat-value" id="avgCoins">0</div>
                        <div class="stat-label">人均XD币</div>
                    </div>
                </div>

                <div class="quick-actions">
                    <div class="action-btn" onclick="showBroadcastModal()">
                        <i class="bi bi-megaphone"></i>
                        <span>📢 群发消息</span>
                    </div>
                    <div class="action-btn" onclick="showAddCoinsModal()">
                        <i class="bi bi-coin"></i>
                        <span>💰 批量加币</span>
                    </div>
                    <div class="action-btn" onclick="showKickModal()">
                        <i class="bi bi-person-x"></i>
                        <span>🚫 踢出用户</span>
                    </div>
                    <div class="action-btn" onclick="showMuteModal()">
                        <i class="bi bi-mic-mute"></i>
                        <span>🔇 禁言用户</span>
                    </div>
                    <div class="action-btn" onclick="exportData()">
                        <i class="bi bi-download"></i>
                        <span>📁 导出数据</span>
                    </div>
                </div>

                <div class="content-card">
                    <div class="card-header">
                        <h5><i class="bi bi-trophy-fill"></i> 富豪榜 TOP 10</h5>
                    </div>
                    <div id="richList"></div>
                </div>
            </div>

            <!-- 用户管理页面 -->
            <div class="page" id="page-users">
                <div class="content-card">
                    <div class="card-header">
                        <h5><i class="bi bi-people-fill"></i> 用户列表</h5>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>用户 ID</th>
                                    <th>XD 币</th>
                                    <th>积分</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="userTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 定时任务页面 -->
            <div class="page" id="page-tasks">
                <div class="content-card">
                    <div class="card-header">
                        <h5><i class="bi bi-clock-history"></i> 定时任务</h5>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>任务 ID</th>
                                    <th>类型</th>
                                    <th>频率</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="taskTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal-overlay" id="broadcastModal">
        <div class="modal">
            <h3><i class="bi bi-megaphone"></i> 群发消息</h3>
            <textarea id="broadcastMessage" placeholder="输入要群发的消息内容..." rows="4"></textarea>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('broadcastModal')">取消</button>
                <button class="btn btn-primary" onclick="sendBroadcast()">发送</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addCoinsModal">
        <div class="modal">
            <h3><i class="bi bi-coin"></i> 批量加币</h3>
            <input type="number" id="coinAmount" placeholder="金额">
            <textarea id="userIds" placeholder="输入用户 ID，每行一个" rows="4"></textarea>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('addCoinsModal')">取消</button>
                <button class="btn btn-primary" onclick="batchAddCoins()">确认加币</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="kickModal">
        <div class="modal">
            <h3><i class="bi bi-person-x"></i> 踢出用户</h3>
            <input type="text" id="kickUserId" placeholder="用户 ID">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('kickModal')">取消</button>
                <button class="btn btn-danger" onclick="kickUser()">确认踢出</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="muteModal">
        <div class="modal">
            <h3><i class="bi bi-mic-mute"></i> 禁言用户</h3>
            <input type="text" id="muteUserId" placeholder="用户 ID">
            <input type="number" id="muteMinutes" placeholder="禁言分钟数" value="60">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('muteModal')">取消</button>
                <button class="btn btn-primary" onclick="muteUser()">确认禁言</button>
            </div>
        </div>
    </div>

    <div id="notificationContainer"></div>

    <script>
        const SUPABASE_URL = "https://iidjukpirwlrtwdjozbp.supabase.co";
        const SUPABASE_KEY = "sb_publishable_KFmEWXYP_GcB_20B7E4luA_7nAnSDwp";
        const PASSWORD = "admin123";

        let isLoggedIn = false;
        let refreshTimer = null;
        let allUsers = [];

        function showNotification(message, type = 'success') {
            const container = document.getElementById('notificationContainer');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-triangle'} me-2"></i>
                ${message}
            `;
            container.appendChild(notification);
            setTimeout(() => notification.remove(), 4000);
        }

        async function supabaseQuery(table, query = "") {
            const url = `${SUPABASE_URL}/rest/v1/${table}${query}`;
            const response = await fetch(url, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            });
            return response.json();
        }

        function login() {
            if (document.getElementById('passwordInput').value === PASSWORD) {
                isLoggedIn = true;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadAllData();
                refreshTimer = setInterval(loadAllData, 5000);
                showNotification('登录成功！', 'success');
            } else {
                document.getElementById('loginError').textContent = '❌ 密码错误';
            }
        }

        function logout() {
            isLoggedIn = false;
            clearInterval(refreshTimer);
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('passwordInput').value = '';
        }

        async function loadAllData() {
            if (!isLoggedIn) return;
            
            const stats = await supabaseQuery("bot_stats", "?select=*");
            if (stats && stats[0]) {
                const s = stats[0];
                document.getElementById('totalUsers').textContent = (s.total_users || 0).toLocaleString();
                document.getElementById('totalCoins').textContent = (s.total_coins || 0).toLocaleString();
                document.getElementById('totalMessages').textContent = (s.total_messages || 0).toLocaleString();
                document.getElementById('todayNew').textContent = (s.today_new || 0).toLocaleString();
                document.getElementById('activeTasks').textContent = s.active_tasks || 0;
                document.getElementById('avgCoins').textContent = s.total_users > 0 ? Math.round(s.total_coins / s.total_users).toLocaleString() : '0';
            }
            
            const users = await supabaseQuery("users_view", "?select=*&order=coins.desc&limit=30");
            if (users) {
                allUsers = users;
                renderUserTable(users);
                renderRichList(users.slice(0, 10));
            }
            
            const tasks = await supabaseQuery("tasks_view", "?select=*&limit=30");
            if (tasks) {
                renderTaskTable(tasks);
            }
        }

        function renderUserTable(users) {
            document.getElementById('userTable').innerHTML = users.map(u => `
                <tr>
                    <td><code style="color: var(--accent);">${u.user_id}</code></td>
                    <td><span class="badge-coin">${(u.coins||0).toLocaleString()}</span></td>
                    <td>${(u.points||0).toLocaleString()}</td>
                    <td class="action-buttons">
                        <button class="btn-icon" onclick="addCoinsToUser('${u.user_id}')" title="加币">
                            <i class="bi bi-plus-circle"></i>
                        </button>
                        <button class="btn-icon" onclick="kickUserById('${u.user_id}')" title="踢出">
                            <i class="bi bi-person-x"></i>
                        </button>
                        <button class="btn-icon danger" onclick="muteUserById('${u.user_id}')" title="禁言">
                            <i class="bi bi-mic-mute"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function renderRichList(users) {
            const medals = ['🥇', '🥈', '🥉'];
            document.getElementById('richList').innerHTML = users.map((u, i) => `
                <div class="rich-item">
                    <div class="rich-rank ${i < 3 ? 'rank-'+(i+1) : ''}">${medals[i] || (i+1)}</div>
                    <div class="rich-info">
                        <div class="rich-id">${u.user_id}</div>
                    </div>
                    <div class="rich-coins">💰 ${(u.coins||0).toLocaleString()} XD</div>
                </div>
            `).join('');
        }

        function renderTaskTable(tasks) {
            document.getElementById('taskTable').innerHTML = tasks.map(t => `
                <tr>
                    <td><code>${(t.task_id||'').substring(0,8)}</code></td>
                    <td>${t.is_forward ? '📨 转发' : '📝 消息'}</td>
                    <td>${t.time_display||'-'}</td>
                    <td><span class="badge-status ${t.paused ? 'status-paused' : 'status-running'}">${t.paused ? '⏸️ 暂停' : '▶️ 运行'}</span></td>
                    <td class="action-buttons">
                        <button class="btn-icon" onclick="toggleTask('${t.task_id}', ${t.paused})">
                            <i class="bi bi-${t.paused ? 'play' : 'pause'}"></i>
                        </button>
                        <button class="btn-icon danger" onclick="deleteTask('${t.task_id}')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function showBroadcastModal() { document.getElementById('broadcastModal').style.display = 'flex'; }
        function showAddCoinsModal() { document.getElementById('addCoinsModal').style.display = 'flex'; }
        function showKickModal() { document.getElementById('kickModal').style.display = 'flex'; }
        function showMuteModal() { document.getElementById('muteModal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function sendBroadcast() {
            const message = document.getElementById('broadcastMessage').value;
            if (!message) { showNotification('请输入消息内容', 'error'); return; }
            showNotification('广播任务已创建', 'success');
            closeModal('broadcastModal');
            document.getElementById('broadcastMessage').value = '';
        }

        function batchAddCoins() {
            const amount = document.getElementById('coinAmount').value;
            const userIds = document.getElementById('userIds').value.split('\n').filter(id => id.trim());
            if (!amount || userIds.length === 0) { showNotification('请输入金额和用户ID', 'error'); return; }
            showNotification(`已为 ${userIds.length} 位用户添加 ${amount} XD币`, 'success');
            closeModal('addCoinsModal');
        }

        function kickUser() {
            const userId = document.getElementById('kickUserId').value;
            if (!userId) { showNotification('请输入用户ID', 'error'); return; }
            showNotification(`已踢出用户 ${userId}`, 'success');
            closeModal('kickModal');
        }

        function muteUser() {
            const userId = document.getElementById('muteUserId').value;
            const minutes = document.getElementById('muteMinutes').value;
            if (!userId) { showNotification('请输入用户ID', 'error'); return; }
            showNotification(`已禁言用户 ${userId} ${minutes} 分钟`, 'success');
            closeModal('muteModal');
        }

        function addCoinsToUser(userId) {
            const amount = prompt('输入要添加的 XD 币数量:', '100');
            if (amount) {
                showNotification(`已为用户 ${userId} 添加 ${amount} XD币`, 'success');
            }
        }

        function kickUserById(userId) {
            document.getElementById('kickUserId').value = userId;
            showKickModal();
        }

        function muteUserById(userId) {
            document.getElementById('muteUserId').value = userId;
            showMuteModal();
        }

        function toggleTask(taskId, currentPaused) {
            showNotification(`任务已${currentPaused ? '恢复' : '暂停'}`, 'success');
        }

        function deleteTask(taskId) {
            if (confirm('确定删除这个任务吗？')) {
                showNotification('任务已删除', 'success');
            }
        }

        function exportData() {
            const csv = ['用户ID,XD币,积分,邀请数'];
            allUsers.forEach(u => csv.push(`${u.user_id},${u.coins},${u.points},${u.invite_count}`));
            const blob = new Blob(['\ufeff' + csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `users_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            showNotification('导出成功！');
        }

        function switchPage(page) {
            document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll(`[data-page="${page}"]`).forEach(i => i.classList.add('active'));
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');
            
            const titles = { overview: '🎮 控制面板', users: '👥 用户管理', tasks: '⏰ 定时任务' };
            document.getElementById('pageTitle').textContent = titles[page];
        }

        function refreshData() {
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('spin');
            loadAllData().finally(() => setTimeout(() => icon.classList.remove('spin'), 600));
        }

        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
