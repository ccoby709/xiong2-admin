<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐻 熊二 · 智能群管系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: rgba(15, 20, 30, 0.8);
            --text-primary: #fff;
            --text-secondary: #8b9bb5;
            --accent: #f59e0b;
            --accent-dark: #ea580c;
            --success: #4ade80;
            --danger: #ef4444;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.06);
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
        }

        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 30% 50%, #1a2744 0%, #0a0e17 100%);
        }
        
        .login-card {
            background: var(--bg-secondary);
            backdrop-filter: blur(30px);
            border-radius: 40px;
            padding: 56px 48px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border-color);
        }
        
        .login-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #f59e0b, #ea580c);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            font-size: 52px;
        }
        
        .login-card h2 {
            color: var(--text-primary);
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 40px;
        }
        
        .input-wrapper {
            position: relative;
            margin-bottom: 28px;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 22px;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 18px 20px 18px 58px;
            background: rgba(255,255,255,0.03);
            border: 2px solid var(--border-color);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 16px;
        }
        
        .input-wrapper input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .btn-login {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #f59e0b, #ea580c);
            border: none;
            border-radius: 24px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }

        .dashboard { display: none; }
        
        .sidebar {
            position: fixed;
            left: 20px;
            top: 20px;
            bottom: 20px;
            width: 280px;
            background: var(--bg-secondary);
            backdrop-filter: blur(30px);
            border-radius: 40px;
            border: 1px solid var(--border-color);
            padding: 32px 20px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            padding: 8px 16px 28px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 28px;
        }
        
        .logo-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #f59e0b, #ea580c);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-right: 16px;
        }
        
        .logo-text h4 { color: var(--text-primary); font-weight: 800; margin: 0; }
        .logo-text span { color: var(--accent); font-size: 13px; }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            margin-bottom: 8px;
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
        }
        
        .nav-item i { font-size: 24px; margin-right: 16px; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
        .nav-item.active { background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(234,88,12,0.1)); color: var(--accent); }
        .nav-item.logout { margin-top: auto; color: var(--danger); }

        .main-content {
            margin-left: 320px;
            margin-right: 20px;
            padding: 20px 0;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 32px;
            margin-bottom: 24px;
            background: var(--bg-secondary);
            backdrop-filter: blur(30px);
            border-radius: 30px;
            border: 1px solid var(--border-color);
        }
        
        .page-title { color: var(--text-primary); font-size: 32px; font-weight: 800; }
        
        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(34,197,94,0.1);
            padding: 10px 20px;
            border-radius: 40px;
            color: var(--success);
        }
        
        .status-badge .dot {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .page { display: none; }
        .page.active { display: block; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
            margin-bottom: 28px;
        }
        
        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }
        
        .stat-value { font-size: 36px; font-weight: 800; color: var(--text-primary); }
        .stat-label { color: var(--text-secondary); font-size: 14px; text-transform: uppercase; }

        .content-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 28px;
            border: 1px solid var(--border-color);
            margin-bottom: 28px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .card-header h5 { color: var(--text-primary); font-weight: 700; margin: 0; }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 28px;
        }
        
        .action-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .action-btn:hover {
            background: rgba(245,158,11,0.1);
            border-color: var(--accent);
            transform: translateY(-3px);
        }
        
        .action-btn i { font-size: 32px; color: var(--accent); }

        .table-wrapper { overflow-x: auto; border-radius: 20px; }
        
        .data-table {
            width: 100%;
            color: var(--text-primary);
        }
        
        .data-table th {
            padding: 16px 20px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }
        
        .data-table td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .data-table tbody tr:hover { background: rgba(255,255,255,0.02); }
        
        .badge-coin {
            background: linear-gradient(135deg, #f59e0b, #ea580c);
            color: #fff;
            padding: 6px 16px;
            border-radius: 40px;
        }
        
        .badge-status {
            padding: 6px 14px;
            border-radius: 40px;
        }
        
        .status-running { background: rgba(34,197,94,0.12); color: var(--success); }
        .status-paused { background: rgba(245,158,11,0.12); color: var(--accent); }
        
        .action-buttons { display: flex; gap: 8px; }
        
        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-icon:hover { background: rgba(245,158,11,0.1); border-color: var(--accent); }
        
        .btn-icon.danger:hover { background: rgba(239,68,68,0.1); border-color: var(--danger); color: var(--danger); }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .modal {
            background: var(--bg-secondary);
            border-radius: 32px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--border-color);
        }
        
        .modal h3 { color: var(--text-primary); margin-bottom: 24px; }
        
        .modal input, .modal textarea, .modal select {
            width: 100%;
            padding: 14px 18px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-primary);
            margin-bottom: 16px;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-primary { background: linear-gradient(135deg, #f59e0b, #ea580c); color: #fff; }
        .btn-secondary { background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--border-color); }
        .btn-danger { background: var(--danger); color: #fff; }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 16px 24px;
            border: 1px solid var(--border-color);
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        
        .notification.success { border-left: 4px solid var(--success); }
        .notification.error { border-left: 4px solid var(--danger); }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
        }
        
        .toggle-switch {
            width: 60px;
            height: 32px;
            background: var(--card-bg);
            border-radius: 40px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }
        
        .toggle-switch.active {
            background: var(--accent);
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: all 0.3s;
        }
        
        .toggle-switch.active::after {
            left: 30px;
        }

        @media (max-width: 1400px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .quick-actions { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <div class="login-page" id="loginPage">
        <div class="login-card">
            <div class="login-avatar">🐻</div>
            <h2>熊二 · 智能群管</h2>
            <p class="login-subtitle">远程控制面板</p>
            <div class="input-wrapper">
                <i class="bi bi-shield-lock"></i>
                <input type="password" id="passwordInput" placeholder="管理员密码" autocomplete="off">
            </div>
            <button class="btn-login" onclick="login()">登 录</button>
            <div id="loginError" style="color: #ef4444; text-align: center; margin-top: 16px;"></div>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="sidebar">
            <div class="logo">
                <div class="logo-icon">🐻</div>
                <div class="logo-text">
                    <h4>熊二后台</h4>
                    <span>远程控制</span>
                </div>
            </div>
            <div class="nav-item active" data-page="overview" onclick="switchPage('overview')">
                <i class="bi bi-speedometer"></i> 控制面板
            </div>
            <div class="nav-item" data-page="users" onclick="switchPage('users')">
                <i class="bi bi-people"></i> 用户管理
            </div>
            <div class="nav-item" data-page="tasks" onclick="switchPage('tasks')">
                <i class="bi bi-clock-history"></i> 定时任务
            </div>
            <div class="nav-item" data-page="settings" onclick="switchPage('settings')">
                <i class="bi bi-gear"></i> 系统设置
            </div>
            <div class="nav-item logout" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i> 退出登录
            </div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <h2 class="page-title" id="pageTitle">🎮 控制面板</h2>
                <div class="status-badge">
                    <span class="dot"></span>
                    <span id="apiStatus">API 连接中...</span>
                </div>
            </div>

            <!-- 控制面板 -->
            <div class="page active" id="page-overview">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalUsers">0</div>
                        <div class="stat-label">总用户</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalCoins">0</div>
                        <div class="stat-label">总XD币</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalMessages">0</div>
                        <div class="stat-label">总发言</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="todayNew">0</div>
                        <div class="stat-label">今日新增</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="activeTasks">0</div>
                        <div class="stat-label">活跃任务</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="avgCoins">0</div>
                        <div class="stat-label">人均XD币</div>
                    </div>
                </div>

                <div class="quick-actions">
                    <div class="action-btn" onclick="showBroadcastModal()">
                        <i class="bi bi-megaphone"></i>
                        <span>📢 群发消息</span>
                    </div>
                    <div class="action-btn" onclick="showAddCoinsModal()">
                        <i class="bi bi-coin"></i>
                        <span>💰 批量加币</span>
                    </div>
                    <div class="action-btn" onclick="showKickModal()">
                        <i class="bi bi-person-x"></i>
                        <span>🚫 踢出用户</span>
                    </div>
                    <div class="action-btn" onclick="showMuteModal()">
                        <i class="bi bi-mic-mute"></i>
                        <span>🔇 禁言用户</span>
                    </div>
                    <div class="action-btn" onclick="exportData()">
                        <i class="bi bi-download"></i>
                        <span>📁 导出数据</span>
                    </div>
                </div>

                <div class="content-card">
                    <div class="card-header">
                        <h5><i class="bi bi-trophy-fill"></i> 富豪榜 TOP 10</h5>
                    </div>
                    <div id="richList"></div>
                </div>
            </div>

            <!-- 用户管理 -->
            <div class="page" id="page-users">
                <div class="content-card">
                    <div class="card-header">
                        <h5><i class="bi bi-people-fill"></i> 用户列表</h5>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>用户 ID</th>
                                    <th>XD 币</th>
                                    <th>积分</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="userTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 定时任务 -->
            <div class="page" id="page-tasks">
                <div class="content-card">
                    <div class="card-header">
                        <h5><i class="bi bi-clock-history"></i> 定时任务</h5>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>任务 ID</th>
                                    <th>类型</th>
                                    <th>频率</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="taskTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 系统设置 -->
            <div class="page" id="page-settings">
                <div class="content-card">
                    <div class="card-header">
                        <h5><i class="bi bi-gear-fill"></i> 群组设置</h5>
                    </div>
                    
                    <div class="setting-item">
                        <div>
                            <strong>🔐 入群验证</strong>
                            <p style="color: var(--text-secondary); font-size: 14px;">新用户需要验证才能发言</p>
                        </div>
                        <div class="toggle-switch active" id="verifyToggle" onclick="toggleVerify()"></div>
                    </div>
                    
                    <div class="setting-item">
                        <div>
                            <strong>📝 欢迎语</strong>
                            <p style="color: var(--text-secondary); font-size: 14px;" id="welcomeText">🎉 欢迎 {user} 加入本群！</p>
                        </div>
                        <button class="btn-icon" onclick="showWelcomeModal()">
                            <i class="bi bi-pencil"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal-overlay" id="broadcastModal">
        <div class="modal">
            <h3><i class="bi bi-megaphone me-2"></i>群发消息</h3>
            <textarea id="broadcastMessage" placeholder="输入要群发的消息内容..." rows="4"></textarea>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('broadcastModal')">取消</button>
                <button class="btn btn-primary" onclick="sendBroadcast()">发送</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addCoinsModal">
        <div class="modal">
            <h3><i class="bi bi-coin me-2"></i>批量加币</h3>
            <input type="number" id="coinAmount" placeholder="金额">
            <textarea id="userIds" placeholder="输入用户 ID，每行一个" rows="4"></textarea>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('addCoinsModal')">取消</button>
                <button class="btn btn-primary" onclick="batchAddCoins()">确认加币</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="kickModal">
        <div class="modal">
            <h3><i class="bi bi-person-x me-2"></i>踢出用户</h3>
            <input type="text" id="kickUserId" placeholder="用户 ID">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('kickModal')">取消</button>
                <button class="btn btn-danger" onclick="kickUser()">确认踢出</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="muteModal">
        <div class="modal">
            <h3><i class="bi bi-mic-mute me-2"></i>禁言用户</h3>
            <input type="text" id="muteUserId" placeholder="用户 ID">
            <input type="number" id="muteMinutes" placeholder="禁言分钟数" value="60">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('muteModal')">取消</button>
                <button class="btn btn-primary" onclick="muteUser()">确认禁言</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="welcomeModal">
        <div class="modal">
            <h3><i class="bi bi-pencil me-2"></i>设置欢迎语</h3>
            <textarea id="welcomeInput" placeholder="欢迎语，使用 {user} 代表用户名" rows="3">🎉 欢迎 {user} 加入本群！</textarea>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('welcomeModal')">取消</button>
                <button class="btn btn-primary" onclick="saveWelcome()">保存</button>
            </div>
        </div>
    </div>

    <div id="notificationContainer"></div>

    <script>
        // 配置
        const SUPABASE_URL = "https://iidjukpirwlrtwdjozbp.supabase.co";
        const SUPABASE_KEY = "sb_publishable_KFmEWXYP_GcB_20B7E4luA_7nAnSDwp";
        const API_URL = "http://localhost:5000";  // 机器人 API 地址
        const PASSWORD = "admin123";

        let isLoggedIn = false;
        let refreshTimer = null;
        let allUsers = [];

        // 显示通知
        function showNotification(message, type = 'success') {
            const container = document.getElementById('notificationContainer');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-triangle'} me-2"></i>
                ${message}
            `;
            container.appendChild(notification);
            setTimeout(() => notification.remove(), 4000);
        }

        // API 调用
        async function callAPI(endpoint, data) {
            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...data, password: PASSWORD })
                });
                const result = await response.json();
                if (result.success) {
                    showNotification('操作成功！', 'success');
                    loadAllData();
                } else {
                    showNotification(result.error || '操作失败', 'error');
                }
                return result;
            } catch (error) {
                showNotification('API 连接失败，请确保机器人已启动', 'error');
                return { success: false };
            }
        }

        // Supabase 查询
        async function supabaseQuery(table, query = "") {
            const url = `${SUPABASE_URL}/rest/v1/${table}${query}`;
            const response = await fetch(url, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            });
            return response.json();
        }

        function login() {
            if (document.getElementById('passwordInput').value === PASSWORD) {
                isLoggedIn = true;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadAllData();
                refreshTimer = setInterval(loadAllData, 5000);
                checkAPIStatus();
                showNotification('登录成功！', 'success');
            } else {
                document.getElementById('loginError').textContent = '❌ 密码错误';
            }
        }

        function logout() {
            isLoggedIn = false;
            clearInterval(refreshTimer);
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }

        async function checkAPIStatus() {
            try {
                await fetch(API_URL + '/api/broadcast', { method: 'OPTIONS' });
                document.getElementById('apiStatus').innerHTML = '<span class="dot"></span>API 已连接';
            } catch {
                document.getElementById('apiStatus').innerHTML = '<span class="dot" style="background: #ef4444;"></span>API 离线';
            }
        }

        async function loadAllData() {
            if (!isLoggedIn) return;
            
            const stats = await supabaseQuery("bot_stats", "?select=*");
            if (stats && stats[0]) {
                const s = stats[0];
                document.getElementById('totalUsers').textContent = (s.total_users || 0).toLocaleString();
                document.getElementById('totalCoins').textContent = (s.total_coins || 0).toLocaleString();
                document.getElementById('totalMessages').textContent = (s.total_messages || 0).toLocaleString();
                document.getElementById('todayNew').textContent = (s.today_new || 0).toLocaleString();
                document.getElementById('activeTasks').textContent = s.active_tasks || 0;
                document.getElementById('avgCoins').textContent = s.total_users > 0 ? Math.round(s.total_coins / s.total_users).toLocaleString() : '0';
            }
            
            const users = await supabaseQuery("users_view", "?select=*&order=coins.desc&limit=30");
            if (users) {
                allUsers = users;
                renderUserTable(users);
                renderRichList(users.slice(0, 10));
            }
            
            const tasks = await supabaseQuery("tasks_view", "?select=*&limit=30");
            if (tasks) {
                renderTaskTable(tasks);
            }
        }

        function renderUserTable(users) {
            document.getElementById('userTable').innerHTML = users.map(u => `
                <tr>
                    <td><code style="color: #f59e0b;">${u.user_id}</code></td>
                    <td><span class="badge-coin">${(u.coins||0).toLocaleString()}</span></td>
                    <td>${(u.points||0).toLocaleString()}</td>
                    <td class="action-buttons">
                        <button class="btn-icon" onclick="addCoinsToUser('${u.user_id}')" title="加币">
                            <i class="bi bi-plus-circle"></i>
                        </button>
                        <button class="btn-icon" onclick="kickUserById('${u.user_id}')" title="踢出">
                            <i class="bi bi-person-x"></i>
                        </button>
                        <button class="btn-icon danger" onclick="muteUserById('${u.user_id}')" title="禁言">
                            <i class="bi bi-mic-mute"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function renderRichList(users) {
            const medals = ['🥇', '🥈', '🥉'];
            document.getElementById('richList').innerHTML = users.map((u, i) => `
                <div style="display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border-color);">
                    <span>${medals[i] || (i+1)} <code>${u.user_id}</code></span>
                    <span class="badge-coin">💰 ${(u.coins||0).toLocaleString()} XD</span>
                </div>
            `).join('');
        }

        function renderTaskTable(tasks) {
            document.getElementById('taskTable').innerHTML = tasks.map(t => `
                <tr>
                    <td><code>${(t.task_id||'').substring(0,8)}</code></td>
                    <td>${t.is_forward ? '📨 转发' : '📝 消息'}</td>
                    <td>${t.time_display||'-'}</td>
                    <td><span class="badge-status ${t.paused ? 'status-paused' : 'status-running'}">${t.paused ? '⏸️ 暂停' : '▶️ 运行'}</span></td>
                    <td class="action-buttons">
                        <button class="btn-icon" onclick="toggleTask('${t.task_id}', ${t.paused})">
                            <i class="bi bi-${t.paused ? 'play' : 'pause'}"></i>
                        </button>
                        <button class="btn-icon danger" onclick="deleteTask('${t.task_id}')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // 操作函数
        function showBroadcastModal() { document.getElementById('broadcastModal').style.display = 'flex'; }
        function showAddCoinsModal() { document.getElementById('addCoinsModal').style.display = 'flex'; }
        function showKickModal() { document.getElementById('kickModal').style.display = 'flex'; }
        function showMuteModal() { document.getElementById('muteModal').style.display = 'flex'; }
        function showWelcomeModal() { document.getElementById('welcomeModal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        async function sendBroadcast() {
            const message = document.getElementById('broadcastMessage').value;
            if (!message) { showNotification('请输入消息内容', 'error'); return; }
            await callAPI('/api/broadcast', { message });
            closeModal('broadcastModal');
            document.getElementById('broadcastMessage').value = '';
        }

        async function batchAddCoins() {
            const amount = parseInt(document.getElementById('coinAmount').value);
            const userIds = document.getElementById('userIds').value.split('\n').filter(id => id.trim());
            if (!amount || userIds.length === 0) { showNotification('请输入金额和用户ID', 'error'); return; }
            await callAPI('/api/add_coins', { user_ids: userIds, amount });
            closeModal('addCoinsModal');
        }

        async function kickUser() {
            const userId = document.getElementById('kickUserId').value;
            if (!userId) { showNotification('请输入用户ID', 'error'); return; }
            await callAPI('/api/kick_user', { user_id: userId });
            closeModal('kickModal');
        }

        async function muteUser() {
            const userId = document.getElementById('muteUserId').value;
            const minutes = parseInt(document.getElementById('muteMinutes').value);
            if (!userId) { showNotification('请输入用户ID', 'error'); return; }
            await callAPI('/api/mute_user', { user_id: userId, minutes });
            closeModal('muteModal');
        }

        async function addCoinsToUser(userId) {
            const amount = prompt('输入要添加的 XD 币数量:', '100');
            if (amount) {
                await callAPI('/api/add_coins', { user_ids: [userId], amount: parseInt(amount) });
            }
        }

        function kickUserById(userId) {
            document.getElementById('kickUserId').value = userId;
            showKickModal();
        }

        function muteUserById(userId) {
            document.getElementById('muteUserId').value = userId;
            showMuteModal();
        }

        async function toggleTask(taskId, currentPaused) {
            await callAPI('/api/toggle_task', { task_id: taskId, paused: currentPaused ? 0 : 1 });
        }

        async function deleteTask(taskId) {
            if (confirm('确定删除这个任务吗？')) {
                await callAPI('/api/delete_task', { task_id: taskId });
            }
        }

        async function toggleVerify() {
            const toggle = document.getElementById('verifyToggle');
            const isActive = toggle.classList.contains('active');
            await callAPI('/api/toggle_verify', { enabled: !isActive });
            toggle.classList.toggle('active');
        }

        async function saveWelcome() {
            const text = document.getElementById('welcomeInput').value;
            await callAPI('/api/set_welcome', { welcome_text: text });
            document.getElementById('welcomeText').textContent = text;
            closeModal('welcomeModal');
        }

        function exportData() {
            const csv = ['用户ID,XD币,积分,邀请数'];
            allUsers.forEach(u => csv.push(`${u.user_id},${u.coins},${u.points},${u.invite_count}`));
            const blob = new Blob(['\ufeff' + csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `users_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            showNotification('导出成功！');
        }

        function switchPage(page) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelector(`[data-page="${page}"]`).classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');
            document.getElementById('pageTitle').textContent = 
                { overview: '🎮 控制面板', users: '👥 用户管理', tasks: '⏰ 定时任务', settings: '⚙️ 系统设置' }[page];
        }

        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
