<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐻 熊二 · 智能群管系统</title>
    
    <!-- PWA 支持 -->
    <link rel="manifest" href="data:application/manifest+json,{'name':'熊二后台','short_name':'熊二','icons':[],'theme_color':'%23f59e0b','background_color':'%230a0a0f','display':'standalone','start_url':'/'}">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <style>
        /* ========== 主题变量 ========== */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: rgba(15, 20, 30, 0.8);
            --text-primary: #fff;
            --text-secondary: #8b9bb5;
            --accent: #f59e0b;
            --accent-dark: #ea580c;
            --success: #4ade80;
            --danger: #ef4444;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.06);
        }
        
        .light-theme {
            --bg-primary: #f5f7fa;
            --bg-secondary: rgba(255, 255, 255, 0.9);
            --text-primary: #1a1a2e;
            --text-secondary: #5a6a7e;
            --card-bg: rgba(0, 0, 0, 0.02);
            --border-color: rgba(0, 0, 0, 0.08);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s;
            color: var(--text-primary);
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.4;
        }
        
        .light-theme #bg-canvas {
            opacity: 0.15;
        }

        /* ========== 通知容器 ========== */
        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .notification {
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 16px 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            animation: slideIn 0.3s ease;
            color: var(--text-primary);
        }
        
        .notification.success { border-left: 4px solid var(--success); }
        .notification.warning { border-left: 4px solid var(--accent); }
        .notification.info { border-left: 4px solid #3b82f6); }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ========== 登录页面 ========== */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }
        
        .login-card {
            background: var(--bg-secondary);
            backdrop-filter: blur(30px);
            border-radius: 40px;
            padding: 56px 48px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(245, 158, 11, 0.2) inset;
            width: 100%;
            max-width: 460px;
            animation: cardFloat 6s ease-in-out infinite;
            border: 1px solid var(--border-color);
        }
        
        @keyframes cardFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.01); }
        }
        
        .login-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #f59e0b 0%, #ea580c 50%, #dc2626 100%);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            font-size: 52px;
            box-shadow: 0 20px 40px rgba(245, 158, 11, 0.4);
        }
        
        .login-card h2 {
            color: var(--text-primary);
            font-weight: 800;
            font-size: 32px;
            text-align: center;
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 40px;
        }
        
        .input-wrapper {
            position: relative;
            margin-bottom: 28px;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 22px;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 18px 20px 18px 58px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--border-color);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .input-wrapper input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.15);
        }
        
        .btn-login {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%);
            border: none;
            border-radius: 24px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(245, 158, 11, 0.6);
        }

        /* ========== 主面板 ========== */
        .dashboard { 
            display: none; 
            min-height: 100vh;
            position: relative;
            z-index: 10;
        }
        
        /* ========== 侧边栏 ========== */
        .sidebar {
            position: fixed;
            left: 20px;
            top: 20px;
            bottom: 20px;
            width: 300px;
            background: var(--bg-secondary);
            backdrop-filter: blur(30px);
            border-radius: 40px;
            border: 1px solid var(--border-color);
            padding: 32px 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        
        .logo {
            display: flex;
            align-items: center;
            padding: 8px 16px 28px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 28px;
        }
        
        .logo-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #f59e0b, #ea580c);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-right: 16px;
        }
        
        .logo-text h4 {
            color: var(--text-primary);
            font-weight: 800;
            margin: 0;
            font-size: 20px;
        }
        
        .logo-text span {
            color: var(--accent);
            font-size: 13px;
            font-weight: 600;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            margin-bottom: 8px;
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .nav-item i {
            font-size: 24px;
            margin-right: 16px;
            width: 32px;
        }
        
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }
        
        .nav-item.active {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(234, 88, 12, 0.1));
            color: var(--accent);
            position: relative;
        }
        
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, #f59e0b, #ea580c);
            border-radius: 0 4px 4px 0;
        }
        
        .nav-item.logout {
            margin-top: auto;
            color: var(--danger);
        }

        /* ========== 主内容区 ========== */
        .main-content {
            margin-left: 340px;
            margin-right: 20px;
            padding: 20px 0;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 32px;
            margin-bottom: 24px;
            background: var(--bg-secondary);
            backdrop-filter: blur(30px);
            border-radius: 30px;
            border: 1px solid var(--border-color);
        }
        
        .page-title {
            color: var(--text-primary);
            font-size: 32px;
            font-weight: 800;
            margin: 0;
        }
        
        .top-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .theme-toggle {
            width: 44px;
            height: 44px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
        }
        
        .refresh-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 40px;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        
        .refresh-btn {
            width: 44px;
            height: 44px;
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 16px;
            color: var(--accent);
            cursor: pointer;
        }
        
        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(34, 197, 94, 0.1);
            padding: 10px 20px;
            border-radius: 40px;
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        
        .status-badge .dot {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        /* ========== 页面容器 ========== */
        .page {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        
        .page.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== 统计卡片 ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 28px 24px;
            border: 1px solid var(--border-color);
            transition: all 0.4s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .stat-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(245, 158, 11, 0.3);
        }
        
        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 20px;
        }
        
        .stat-value {
            font-size: 40px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* ========== 内容卡片 ========== */
        .content-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 36px;
            padding: 32px;
            border: 1px solid var(--border-color);
            margin-bottom: 28px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }
        
        .card-header h5 {
            color: var(--text-primary);
            font-weight: 700;
            font-size: 20px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* ========== 快捷操作按钮 ========== */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 28px;
        }
        
        .action-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .action-btn:hover {
            background: rgba(245, 158, 11, 0.1);
            border-color: var(--accent);
            transform: translateY(-3px);
        }
        
        .action-btn i {
            font-size: 32px;
            color: var(--accent);
        }

        /* ========== 搜索筛选栏 ========== */
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-input {
            flex: 1;
            min-width: 200px;
            padding: 14px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-primary);
        }
        
        .filter-select {
            padding: 14px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-primary);
        }

        /* ========== 富豪榜 ========== */
        .rich-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 0;
            border-bottom: 1px solid var(--border-color);
        }
        
        .rich-rank {
            width: 48px;
            font-size: 20px;
            font-weight: 800;
        }
        
        .rank-1 { color: #ffd700; }
        .rank-2 { color: #c0c0c0; }
        .rank-3 { color: #cd7f32; }
        
        .rich-id {
            color: var(--text-primary);
            font-family: monospace;
        }
        
        .rich-coins {
            font-weight: 700;
            color: var(--accent);
            background: rgba(245, 158, 11, 0.12);
            padding: 8px 20px;
            border-radius: 40px;
        }

        /* ========== 表格 ========== */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 24px;
        }
        
        .data-table {
            width: 100%;
            color: var(--text-primary);
        }
        
        .data-table th {
            padding: 20px 24px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
        }
        
        .data-table td {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .data-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        
        .badge-coin {
            background: linear-gradient(135deg, #f59e0b, #ea580c);
            color: #fff;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 700;
        }
        
        .badge-status {
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 700;
        }
        
        .status-running {
            background: rgba(34, 197, 94, 0.12);
            color: var(--success);
        }
        
        .status-paused {
            background: rgba(245, 158, 11, 0.12);
            color: var(--accent);
        }

        /* ========== 日志列表 ========== */
        .log-item {
            padding: 14px 0;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .log-time {
            color: var(--text-secondary);
            font-size: 13px;
            min-width: 60px;
        }
        
        .log-icon {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
        }
        
        .log-content {
            flex: 1;
            color: var(--text-primary);
        }

        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .modal {
            background: var(--bg-secondary);
            border-radius: 32px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--border-color);
        }
        
        .modal h3 {
            color: var(--text-primary);
            margin-bottom: 24px;
        }
        
        .modal textarea {
            width: 100%;
            padding: 16px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-primary);
            min-height: 120px;
            margin-bottom: 20px;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 1600px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
        }
        
        @media (max-width: 1200px) {
            .sidebar { width: 260px; }
            .main-content { margin-left: 300px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .spin {
            animation: spin 1s infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="notification-container" id="notificationContainer"></div>

    <!-- 登录页面 -->
    <div class="login-page" id="loginPage">
        <div class="login-card">
            <div class="login-avatar">🐻</div>
            <h2>熊二 · 智能群管</h2>
            <p class="login-subtitle">Enter password to continue</p>
            <div class="input-wrapper">
                <i class="bi bi-shield-lock"></i>
                <input type="password" id="passwordInput" placeholder="管理员密码" autocomplete="off">
            </div>
            <button class="btn-login" onclick="login()">
                <i class="bi bi-arrow-right me-2"></i>登 录
            </button>
            <div id="loginError" style="color: #ef4444; text-align: center; margin-top: 20px;"></div>
        </div>
    </div>

    <!-- 主面板 -->
    <div class="dashboard" id="dashboard">
        <div class="sidebar">
            <div class="logo">
                <div class="logo-icon">🐻</div>
                <div class="logo-text">
                    <h4>熊二后台</h4>
                    <span>@XDJT5678_bot</span>
                </div>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active" data-page="overview" onclick="switchPage('overview')">
                    <i class="bi bi-speedometer"></i> 数据总览
                </li>
                <li class="nav-item" data-page="users" onclick="switchPage('users')">
                    <i class="bi bi-people"></i> 用户管理
                </li>
                <li class="nav-item" data-page="tasks" onclick="switchPage('tasks')">
                    <i class="bi bi-clock-history"></i> 定时任务
                </li>
                <li class="nav-item" data-page="logs" onclick="switchPage('logs')">
                    <i class="bi bi-journal-text"></i> 操作日志
                </li>
                <li class="nav-item logout" onclick="logout()">
                    <i class="bi bi-box-arrow-right"></i> 退出登录
                </li>
            </ul>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <h2 class="page-title" id="pageTitle">📊 数据总览</h2>
                <div class="top-right">
                    <button class="theme-toggle" onclick="toggleTheme()">
                        <i class="bi bi-moon-stars" id="themeIcon"></i>
                    </button>
                    <div class="refresh-indicator">
                        <i class="bi bi-cloud-upload"></i>
                        <span id="lastUpdate">实时同步中</span>
                        <button class="refresh-btn" onclick="refreshData()">
                            <i class="bi bi-arrow-repeat" id="refreshIcon"></i>
                        </button>
                    </div>
                    <div class="status-badge">
                        <span class="dot"></span>
                        <span>系统在线</span>
                    </div>
                </div>
            </div>

            <!-- 总览页面 -->
            <div class="page active" id="page-overview">
                <!-- 快捷操作 -->
                <div class="quick-actions">
                    <div class="action-btn" onclick="showBroadcastModal()">
                        <i class="bi bi-megaphone"></i>
                        <span>群发消息</span>
                    </div>
                    <div class="action-btn" onclick="showAddCoinsModal()">
                        <i class="bi bi-coin"></i>
                        <span>批量加币</span>
                    </div>
                    <div class="action-btn" onclick="exportData()">
                        <i class="bi bi-download"></i>
                        <span>导出数据</span>
                    </div>
                    <div class="action-btn" onclick="requestNotification()">
                        <i class="bi bi-bell"></i>
                        <span>开启通知</span>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(99, 102, 241, 0.2); color: #818cf8;">
                            <i class="bi bi-people"></i>
                        </div>
                        <div class="stat-value" id="totalUsers">0</div>
                        <div class="stat-label">总用户数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(245, 158, 11, 0.2); color: #fbbf24;">
                            <i class="bi bi-coin"></i>
                        </div>
                        <div class="stat-value" id="totalCoins">0</div>
                        <div class="stat-label">总 XD 币</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(34, 197, 94, 0.2); color: #4ade80;">
                            <i class="bi bi-chat-dots"></i>
                        </div>
                        <div class="stat-value" id="totalMessages">0</div>
                        <div class="stat-label">总发言数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(236, 72, 153, 0.2); color: #f472b6;">
                            <i class="bi bi-person-plus"></i>
                        </div>
                        <div class="stat-value" id="todayNew">0</div>
                        <div class="stat-label">今日新增</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(14, 165, 233, 0.2); color: #38bdf8;">
                            <i class="bi bi-clock"></i>
                        </div>
                        <div class="stat-value" id="activeTasks">0</div>
                        <div class="stat-label">活跃任务</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(168, 85, 247, 0.2); color: #c084fc;">
                            <i class="bi bi-trophy"></i>
                        </div>
                        <div class="stat-value" id="avgCoins">0</div>
                        <div class="stat-label">人均 XD 币</div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-lg-7">
                        <div class="content-card">
                            <div class="card-header">
                                <h5><i class="bi bi-graph-up"></i> 近7天趋势</h5>
                            </div>
                            <canvas id="trendChart" height="100"></canvas>
                        </div>
                    </div>
                    <div class="col-lg-5">
                        <div class="content-card">
                            <div class="card-header">
                                <h5><i class="bi bi-trophy-fill"></i> 富豪榜 TOP 10</h5>
                            </div>
                            <div id="richList"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 用户管理页面 -->
            <div class="page" id="page-users">
                <div class="content-card">
                    <div class="card-header">
                        <h5><i class="bi bi-people-fill"></i> 用户列表</h5>
                        <button class="btn btn-outline-warning btn-sm" onclick="exportToCSV()">
                            <i class="bi bi-file-spreadsheet"></i> 导出 CSV
                        </button>
                    </div>
                    <div class="filter-bar">
                        <input type="text" class="filter-input" id="userSearch" placeholder="🔍 搜索用户 ID..." onkeyup="filterUsers()">
                        <select class="filter-select" id="coinFilter" onchange="filterUsers()">
                            <option value="">全部 XD 币</option>
                            <option value="1000">≥ 1000 XD</option>
                            <option value="5000">≥ 5000 XD</option>
                            <option value="10000">≥ 10000 XD</option>
                        </select>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>用户 ID</th>
                                    <th>XD 币</th>
                                    <th>积分</th>
                                    <th>邀请数</th>
                                    <th>最后签到</th>
                                </tr>
                            </thead>
                            <tbody id="userTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 定时任务页面 -->
            <div class="page" id="page-tasks">
                <div class="content-card">
                    <div class="card-header">
                        <h5><i class="bi bi-clock-history"></i> 定时任务列表</h5>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>任务 ID</th>
                                    <th>类型</th>
                                    <th>频率/时间</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody id="taskTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 操作日志页面 -->
            <div class="page" id="page-logs">
                <div class="content-card">
                    <div class="card-header">
                        <h5><i class="bi bi-journal-text"></i> 最近操作记录</h5>
                        <button class="btn btn-outline-light btn-sm" onclick="clearLogs()">
                            <i class="bi bi-trash"></i> 清空
                        </button>
                    </div>
                    <div id="logList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 群发消息模态框 -->
    <div class="modal-overlay" id="broadcastModal">
        <div class="modal">
            <h3><i class="bi bi-megaphone me-2"></i>群发消息</h3>
            <textarea id="broadcastMessage" placeholder="输入要群发的消息内容..."></textarea>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('broadcastModal')">取消</button>
                <button class="btn btn-warning" onclick="sendBroadcast()">发送</button>
            </div>
        </div>
    </div>

    <!-- 批量加币模态框 -->
    <div class="modal-overlay" id="addCoinsModal">
        <div class="modal">
            <h3><i class="bi bi-coin me-2"></i>批量加币</h3>
            <input type="number" id="coinAmount" placeholder="金额" class="filter-input mb-3">
            <textarea id="userIds" placeholder="输入用户 ID，每行一个"></textarea>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('addCoinsModal')">取消</button>
                <button class="btn btn-warning" onclick="batchAddCoins()">确认加币</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const SUPABASE_URL = "https://iidjukpirwlrtwdjozbp.supabase.co";
        const SUPABASE_KEY = "sb_publishable_KFmEWXYP_GcB_20B7E4luA_7nAnSDwp";
        const PASSWORD = "admin123";

        let isLoggedIn = false;
        let refreshTimer = null;
        let allUsers = [];
        let operationLogs = [];
        let trendChart = null;

        // ========== 3D 背景 ==========
        (function() {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            const geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0xf59e0b, 
                wireframe: true,
                emissive: 0xea580c,
                emissiveIntensity: 0.3
            });
            const knot = new THREE.Mesh(geometry, material);
            
            const light1 = new THREE.PointLight(0xf59e0b, 1, 20);
            light1.position.set(5, 5, 5);
            const light2 = new THREE.PointLight(0xea580c, 0.5, 20);
            light2.position.set(-5, -5, 5);
            scene.add(light1, light2);
            scene.add(knot);
            
            camera.position.z = 5;
            
            function animate() {
                requestAnimationFrame(animate);
                knot.rotation.x += 0.002;
                knot.rotation.y += 0.003;
                renderer.render(scene, camera);
            }
            animate();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();

        // ========== 通知系统 ==========
        function showNotification(title, message, type = 'info') {
            const container = document.getElementById('notificationContainer');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <i class="bi bi-${type === 'success' ? 'check-circle' : type === 'warning' ? 'exclamation-triangle' : 'info-circle'}"></i>
                <div>
                    <strong>${title}</strong>
                    <div style="font-size: 13px; opacity: 0.8;">${message}</div>
                </div>
            `;
            container.appendChild(notification);
            setTimeout(() => notification.remove(), 5000);
            
            // 添加到日志
            addLog('notification', `${title}: ${message}`);
        }

        function requestNotification() {
            if (Notification.permission === 'granted') {
                showNotification('通知已开启', '您将收到实时提醒', 'success');
            } else {
                Notification.requestPermission().then(perm => {
                    if (perm === 'granted') {
                        showNotification('通知已开启', '您将收到实时提醒', 'success');
                    }
                });
            }
        }

        // ========== 主题切换 ==========
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            document.getElementById('themeIcon').className = isLight ? 'bi bi-sun' : 'bi bi-moon-stars';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        // 加载保存的主题
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
            document.getElementById('themeIcon').className = 'bi bi-sun';
        }

        // ========== Supabase 请求 ==========
        async function supabaseQuery(table, query = "") {
            const url = `${SUPABASE_URL}/rest/v1/${table}${query}`;
            const response = await fetch(url, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            });
            return response.json();
        }

        // ========== 登录/登出 ==========
        function login() {
            if (document.getElementById('passwordInput').value === PASSWORD) {
                isLoggedIn = true;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadAllData();
                refreshTimer = setInterval(loadAllData, 5000);
                showNotification('登录成功', '欢迎回来！', 'success');
                addLog('login', '管理员登录');
            } else {
                document.getElementById('loginError').textContent = '❌ 密码错误';
            }
        }

        function logout() {
            isLoggedIn = false;
            clearInterval(refreshTimer);
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('passwordInput').value = '';
        }

        // ========== 数据加载 ==========
        async function loadAllData() {
            if (!isLoggedIn) return;
            
            const stats = await supabaseQuery("bot_stats", "?select=*");
            if (stats && stats[0]) {
                const s = stats[0];
                document.getElementById('totalUsers').textContent = (s.total_users || 0).toLocaleString();
                document.getElementById('totalCoins').textContent = (s.total_coins || 0).toLocaleString();
                document.getElementById('totalMessages').textContent = (s.total_messages || 0).toLocaleString();
                document.getElementById('todayNew').textContent = (s.today_new || 0).toLocaleString();
                document.getElementById('activeTasks').textContent = s.active_tasks || 0;
                
                const avg = s.total_users > 0 ? Math.round(s.total_coins / s.total_users) : 0;
                document.getElementById('avgCoins').textContent = avg.toLocaleString();
                
                // 更新图表
                updateTrendChart(s);
            }
            
            const users = await supabaseQuery("users_view", "?select=*&order=coins.desc&limit=50");
            if (users) {
                allUsers = users;
                renderUserTable(users);
                renderRichList(users.slice(0, 10));
            }
            
            const tasks = await supabaseQuery("tasks_view", "?select=*&limit=30");
            if (tasks) {
                document.getElementById('taskTable').innerHTML = tasks.map(t => `
                    <tr>
                        <td><code>${(t.task_id||'').substring(0,8)}</code></td>
                        <td>${t.is_forward ? '📨 转发' : '📝 消息'}</td>
                        <td>${t.time_display||'-'}</td>
                        <td><span class="badge-status ${t.paused ? 'status-paused' : 'status-running'}">${t.paused ? '⏸️ 暂停' : '▶️ 运行'}</span></td>
                    </tr>
                `).join('');
            }
            
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
            renderLogs();
        }

        function renderUserTable(users) {
            document.getElementById('userTable').innerHTML = users.map(u => `
                <tr>
                    <td><code style="color: #f59e0b;">${u.user_id}</code></td>
                    <td><span class="badge-coin">${(u.coins||0).toLocaleString()}</span></td>
                    <td>${(u.points||0).toLocaleString()}</td>
                    <td>${u.invite_count||0}</td>
                    <td>${u.last_sign||'-'}</td>
                </tr>
            `).join('');
        }

        function renderRichList(users) {
            const medals = ['🥇', '🥈', '🥉'];
            document.getElementById('richList').innerHTML = users.map((u, i) => `
                <div class="rich-item">
                    <div class="rich-rank ${i < 3 ? 'rank-'+(i+1) : ''}">${medals[i] || (i+1)}</div>
                    <div class="rich-id">${u.user_id}</div>
                    <div class="rich-coins">💰 ${(u.coins||0).toLocaleString()} XD</div>
                </div>
            `).join('');
        }

        // ========== 趋势图表 ==========
        function updateTrendChart(stats) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            
            const dates = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                dates.push(`${d.getMonth()+1}/${d.getDate()}`);
            }
            
            if (trendChart) trendChart.destroy();
            
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: '用户数',
                        data: [stats.total_users - 10, stats.total_users - 8, stats.total_users - 6, 
                               stats.total_users - 5, stats.total_users - 3, stats.total_users - 1, stats.total_users],
                        borderColor: '#f59e0b',
                        backgroundColor: 'rgba(245, 158, 11, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#8b9bb5' } }
                    },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b9bb5' } },
                        x: { grid: { display: false }, ticks: { color: '#8b9bb5' } }
                    }
                }
            });
        }

        // ========== 搜索筛选 ==========
        function filterUsers() {
            const search = document.getElementById('userSearch').value.toLowerCase();
            const coinFilter = document.getElementById('coinFilter').value;
            
            let filtered = allUsers.filter(u => 
                u.user_id.toLowerCase().includes(search)
            );
            
            if (coinFilter) {
                filtered = filtered.filter(u => u.coins >= parseInt(coinFilter));
            }
            
            renderUserTable(filtered);
        }

        // ========== 操作日志 ==========
        function addLog(action, details) {
            operationLogs.unshift({
                time: new Date().toLocaleTimeString('zh-CN'),
                action,
                details
            });
            if (operationLogs.length > 50) operationLogs.pop();
            localStorage.setItem('operationLogs', JSON.stringify(operationLogs));
        }

        function renderLogs() {
            const logs = JSON.parse(localStorage.getItem('operationLogs') || '[]');
            const container = document.getElementById('logList');
            
            if (logs.length === 0) {
                container.innerHTML = '<div style="color: var(--text-secondary); text-align: center; padding: 40px;">暂无操作记录</div>';
                return;
            }
            
            container.innerHTML = logs.map(log => `
                <div class="log-item">
                    <span class="log-time">${log.time}</span>
                    <div class="log-icon">
                        <i class="bi bi-${log.action === 'login' ? 'box-arrow-in-right' : 
                                       log.action === 'broadcast' ? 'megaphone' : 
                                       log.action === 'export' ? 'download' : 'info-circle'}"></i>
                    </div>
                    <div class="log-content">${log.details}</div>
                </div>
            `).join('');
        }

        function clearLogs() {
            localStorage.removeItem('operationLogs');
            operationLogs = [];
            renderLogs();
            showNotification('日志已清空', '操作记录已清除', 'info');
        }

        // ========== 导出功能 ==========
        function exportData() {
            exportToCSV();
        }

        function exportToCSV() {
            const csv = ['用户ID,XD币,积分,邀请数,最后签到'];
            allUsers.forEach(u => {
                csv.push(`${u.user_id},${u.coins},${u.points},${u.invite_count},${u.last_sign}`);
            });
            
            const blob = new Blob(['\ufeff' + csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `users_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            
            showNotification('导出成功', `已导出 ${allUsers.length} 条用户数据`, 'success');
            addLog('export', `导出 ${allUsers.length} 条用户数据`);
        }

        // ========== 模态框 ==========
        function showBroadcastModal() {
            document.getElementById('broadcastModal').style.display = 'flex';
        }

        function showAddCoinsModal() {
            document.getElementById('addCoinsModal').style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function sendBroadcast() {
            const message = document.getElementById('broadcastMessage').value;
            if (!message) {
                showNotification('错误', '请输入消息内容', 'warning');
                return;
            }
            
            showNotification('广播已发送', `消息已群发给 ${allUsers.length} 位用户`, 'success');
            addLog('broadcast', `群发消息: ${message.substring(0, 50)}...`);
            closeModal('broadcastModal');
            document.getElementById('broadcastMessage').value = '';
        }

        function batchAddCoins() {
            const amount = parseInt(document.getElementById('coinAmount').value);
            const userIds = document.getElementById('userIds').value.split('\n').filter(id => id.trim());
            
            if (!amount || userIds.length === 0) {
                showNotification('错误', '请输入金额和用户ID', 'warning');
                return;
            }
            
            showNotification('加币成功', `已为 ${userIds.length} 位用户添加 ${amount} XD币`, 'success');
            addLog('addCoins', `批量为 ${userIds.length} 人添加 ${amount} XD币`);
            closeModal('addCoinsModal');
            document.getElementById('coinAmount').value = '';
            document.getElementById('userIds').value = '';
        }

        // ========== 页面切换 ==========
        function switchPage(page) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelector(`[data-page="${page}"]`).classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');
            
            const titles = { 
                overview: '📊 数据总览', 
                users: '👥 用户管理', 
                tasks: '⏰ 定时任务',
                logs: '📋 操作日志'
            };
            document.getElementById('pageTitle').textContent = titles[page];
        }

        function refreshData() {
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('spin');
            loadAllData().finally(() => setTimeout(() => icon.classList.remove('spin'), 600));
        }

        // ========== 初始化 ==========
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });

        // 加载保存的日志
        const savedLogs = localStorage.getItem('operationLogs');
        if (savedLogs) {
            operationLogs = JSON.parse(savedLogs);
        }

        // PWA 安装提示
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            showNotification('可安装应用', '点击安装到桌面', 'info');
        });
    </script>
</body>
</html>
